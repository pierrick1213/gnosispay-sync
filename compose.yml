services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gnosispaysync}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gnosispaysync}"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    image: ${GNOSISPAY_SYNC_IMAGE:-pickcool/gnosispay-sync:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-gnosispaysync};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      GnosisPay__ApiBaseUrl: ${GNOSISPAY_API_BASE_URL:-https://api.gnosispay.com}
      GnosisPay__PrivateKey: ${GNOSISPAY_PRIVATE_KEY:?GNOSISPAY_PRIVATE_KEY is required}

volumes:
  postgres-data:
